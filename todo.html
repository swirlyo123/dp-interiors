<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 200vh; /* to enable scroll */
            font-family: sans-serif;
            overflow-x: hidden;
        }

        .block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s ease;
            will-change: transform, opacity;
        }

        .block1 {
            background: #3498db;
            color: white;
            z-index: 1;
            transform: scale(1);
            opacity: 1;
        }

        .block2 {
            background: #2ecc71;
            color: white;
            z-index: 2;
            transform: translateY(100%);
            opacity: 0;
        }

    </style>
</head>
<body>



<section class="block block1" id="block1">
    <h1>First Block</h1>
</section>

<section class="block block2" id="block2">
    <h1>Second Block</h1>
</section>





<script>
    const block1 = document.getElementById('block1');
    const block2 = document.getElementById('block2');

    window.addEventListener('scroll', () => {
        const scrollY = window.scrollY;
        const triggerPoint = window.innerHeight * 0.5;

        if (scrollY > triggerPoint) {
            // Block 1 zooms out and fades
            block1.style.transform = 'scale(0.5)';
            block1.style.opacity = '0';

            // Block 2 slides in fully
            block2.style.transform = 'translateY(0)';
            block2.style.opacity = '1';
        } else {
            // Reset to original state
            block1.style.transform = 'scale(1)';
            block1.style.opacity = '1';

            block2.style.transform = 'translateY(100%)';
            block2.style.opacity = '0';
        }
    });
</script>



</body>
</html>
