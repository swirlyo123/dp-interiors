        }

        }

        .quote {

            color: #3d6156;

            line-height: 1.4;
        }

        .progress-bars {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .bar {
            width: 30px;
            height: 4px;
            background: #ccc;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: #3d6156;
            border-radius: 10px;
            transition: width 3.5s linear;
        }
    </style>

<script>
    const testimonials = [
        {
            stars: '★★★★★',
            text: 'I was skeptical about virtual design services but their e-design package was comprehensive and perfectly tailored to my needs. - Tony M.'
        },
        {
            stars: '★★★★☆',
            text: 'Great experience working with the team, highly recommend for online decor projects. - Sarah K.'
        },
        {
            stars: '★★★★★',
            text: 'Affordable, efficient, and beautiful results! Couldn’t have asked for more. - Daniel P.'
        }
    ];

    const quoteEl = document.getElementById('quote');
    const starsEl = document.getElementById('stars');
    const progressBarsEl = document.getElementById('progressBars');

    let currentIndex = 0;
    const duration = 3500;

    function renderProgressBars() {
        progressBarsEl.innerHTML = '';
        testimonials.forEach((_, i) => {
            const bar = document.createElement('div');
            bar.classList.add('bar');
            const fill = document.createElement('div');
            fill.classList.add('bar-fill');
            if (i === currentIndex) {
                fill.style.width = '100%';
            }
            bar.appendChild(fill);
            progressBarsEl.appendChild(bar);
        });
    }

    function resetBars() {
        const fills = document.querySelectorAll('.bar-fill');
        fills.forEach((fill, i) => {
            fill.style.transition = 'none';
            fill.style.width = '0%';
            if (i === currentIndex) {
                setTimeout(() => {
                    fill.style.transition = `width ${duration}ms linear`;
                    fill.style.width = '100%';
                }, 50);
            }
        });
    }

    function showTestimonial() {
        starsEl.classList.remove('visible');
        quoteEl.classList.remove('visible');

        setTimeout(() => {
            const current = testimonials[currentIndex];
            starsEl.textContent = current.stars;
            quoteEl.textContent = current.text;
            starsEl.classList.add('visible');
            quoteEl.classList.add('visible');
            renderProgressBars();
            resetBars();
        }, 300);
    }

    function nextTestimonial() {
        currentIndex = (currentIndex + 1) % testimonials.length;
        showTestimonial();
    }

    renderProgressBars();
    showTestimonial();
    setInterval(nextTestimonial, duration);
</script>
